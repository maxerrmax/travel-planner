{% extends "base.html" %}

{% block content %}

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow p-4" style="width: 500px;">

        <h1 class="text-center mb-4">
            ✈️ AI Travel Planner
        </h1>

        <form method="POST" action="/plan">

            <div class="mb-3">
                <label class="form-label">
                    Destination
                </label>

                <input
                    type="text"
                    name="destination"
                    class="form-control"
                    placeholder="Ex: Tokyo"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Days
                </label>

                <input
                    type="number"
                    name="days"
                    class="form-control"
                    min="1"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Preferences
                </label>

                <input
                    type="text"
                    name="Preferences"
                    class="form-control"
                    placeholder="Ex: Culture"
                    required>
            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">

                Generar pla
            </button>

        </form>

    </div>

</div>

{% endblock %}
