{% extends "base.html" %}

{% block content %}

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow p-4" style="width: 500px;">

        <h1 class="text-center mb-4">
            ✈️ AI Travel Planner
        </h1>

        <form method="POST" action="/plan" id="tripForm">

            <div class="mb-3">
                <label class="form-label">
                    Destination
                </label>

                <input
                    type="text"
                    name="destination"
                    class="form-control"
                    placeholder="Ex: Tokyo"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Days
                </label>

                <input
                    type="number"
                    name="days"
                    class="form-control"
                    min="1"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Preferences
                </label>

                <input
                    type="text"
                    name="Preferences"
                    class="form-control"
                    placeholder="Ex: Culture"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Budget</label>

                <select name="budget" class="form-select">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
            </div>

            <button
                type="submit"
                class="btn btn-primary w-100"
                id="submitBtn">

                Generate Trip
            </button>

        </form>

        <div
            id="loading"
            class="text-center mt-4"
            style="display:none;">

            <div class="spinner-border" role="status"></div>

            <p class="mt-3" id="loadingMessage">
                🤖 Generating itinerary...
            </p>

        </div>

    </div>

</div>

<script>

document.getElementById("tripForm").addEventListener("submit", function() {

    document.getElementById("submitBtn").disabled = true;
    document.getElementById("submitBtn").innerText = "Generating...";

    document.getElementById("loading").style.display = "block";

    const messages = [
        "✈️ Looking for the best places...",
        "🍝 Finding local food spots...",
        "🏛️ Planning activities...",
        "🗺️ Optimizing your route...",
        "🤖 Generating your itinerary..."
    ];

    let i = 0;

    setInterval(() => {
        i = (i + 1) % messages.length;
        document.getElementById("loadingMessage").innerText =
            messages[i];
    }, 3000);

});

</script>

{% endblock %}
